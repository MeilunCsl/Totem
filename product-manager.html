<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>产品库管理</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📦 产品库管理</h1>
        <div class="header-actions">
            <button id="exportProductsBtn" class="btn-back" style="background:#4a8cce; color:white;">📤 导出产品库</button>
            <button id="importProductsBtn" class="btn-back" style="background:#4a8cce; color:white;">📥 导入产品库</button>
            <button id="backToQuoteBtn" class="btn-back btn-primary">← 返回报价单</button>
        </div>
    </div>

    <div class="add-product-form">
        <div class="form-field">
            <label>产品名称 *</label>
            <input type="text" id="prodName" placeholder="例：智能办公椅">
        </div>
        <div class="form-field">
            <label>品牌/型号</label>
            <input type="text" id="prodModel" placeholder="品牌/型号">
        </div>
        <div class="form-field">
            <label>产品描述</label>
            <textarea id="prodDescription" rows="2" placeholder="产品详细描述" style="resize: vertical;"></textarea>
        </div>
        <div class="form-field">
            <label>含税单价 (¥)</label>
            <input type="number" id="prodPrice" step="0.01" placeholder="0.00">
        </div>
        <div class="form-field img-field">
            <label>产品图片</label>
            <div class="img-preview-area">
                <input type="file" id="prodImage" accept="image/*" style="display:none">
                <button type="button" id="uploadBtn" class="btn-submit">📷 上传图片</button>
                <img id="previewImg" class="img-preview" style="display:none;">
            </div>
        </div>
        <!-- 正确的备注字段位置（在图片之后，操作之前） -->
        <div class="form-field">
            <label>备注</label>
            <textarea id="prodRemark" rows="2" placeholder="自定义备注" style="resize: vertical;"></textarea>
        </div>
        <div class="form-field action-field">
            <label>操作</label>
            <div class="action-buttons">
                <button id="toggleViewBtn" class="btn-submit">🔍 切换缩略图模式</button>
                <button class="btn-submit" id="addProductBtn">➕ 添加产品</button>
            </div>
        </div>
    </div>

    <div id="productList" class="product-grid"></div>
</div>

<!-- 编辑产品模态框 -->
<div id="editModal" class="modal-overlay" style="display:none;">
    <div class="modal-container">
        <h3>✏️ 编辑产品</h3>
        <div class="form-field">
            <label>产品名称 *</label>
            <input type="text" id="editProdName" placeholder="产品名称">
        </div>
        <div class="form-field">
            <label>品牌/型号</label>
            <input type="text" id="editProdModel" placeholder="品牌/型号">
        </div>
        <div class="form-field">
            <label>产品描述</label>
            <textarea id="editProdDescription" rows="2" placeholder="产品详细描述" style="resize: vertical;"></textarea>
        </div>
        <!-- 编辑模态框中的并排布局 -->
<div class="form-row">
    <div class="form-field">
        <label>含税单价 (¥)</label>
        <input type="number" id="editProdPrice" step="0.01" placeholder="0.00">
    </div>
    <div class="form-field">
        <label>产品图片</label>
        <div class="img-preview-area">
            <input type="file" id="editProdImage" accept="image/*" style="display:none">
            <button type="button" id="editUploadBtn" style="background:#e2e8f0; border:none; padding:8px 16px; border-radius:40px;">📷 更换图片</button>
            <img id="editPreviewImg" class="img-preview" style="display:none;">
        </div>
    </div>
</div>
<!-- 备注字段单独一行 -->
<div class="form-field">
    <label>备注</label>
    <textarea id="editProdRemark" rows="2" placeholder="自定义备注"></textarea>
</div>

        <div class="modal-actions">
            <button id="cancelEditBtn" class="btn">取消</button>
            <button id="confirmEditBtn" class="btn btn-primary">保存</button>
        </div>
    </div>
</div>

<script>
    // ==================== IndexedDB 配置 ====================
    const DB_NAME = 'QuotationDB';
    const DB_VERSION = 9;
    const PRODUCT_STORE = 'products';

    let db = null;

    function openDB() {
        return new Promise((resolve, reject) => {
            if (db && db.name === DB_NAME) {
                resolve(db);
                return;
            }
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onerror = () => reject(new Error(`IndexedDB 打开失败: ${request.error?.message || '未知错误'}`));
            request.onsuccess = () => {
                db = request.result;
                resolve(db);
            };
            request.onupgradeneeded = (event) => {
                const db = event.target.result;
                if (!db.objectStoreNames.contains(PRODUCT_STORE)) {
                    const store = db.createObjectStore(PRODUCT_STORE, { keyPath: 'id', autoIncrement: true });
                    if (event.oldVersion < 1) {
                        store.add({
                            name: "纸钞机",
                            model: "NV10",
                            description: "高速验钞，支持多国货币",
                            price: 1280,
                            remark: "标配USB接口",
                            imageBase64: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23d9e3f0'/%3E%3Ctext x='50' y='55' font-size='38' text-anchor='middle' fill='%23365e7e'%3E💰%3C/text%3E%3C/svg%3E"
                        });
                        store.add({
                            name: "点验钞机",
                            model: "JBY-D2",
                            description: "智能识别，点钞计数一体",
                            price: 2150,
                            remark: "标配USB接口",
                            imageBase64: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23c8e6df'/%3E%3Ctext x='50' y='55' font-size='40' text-anchor='middle' fill='%233d6b5e'%3E💵%3C/text%3E%3C/svg%3E"
                        });
                    }
                }
            };
        });
    }

    async function getAllProducts() {
        const db = await openDB();
        const tx = db.transaction(PRODUCT_STORE, 'readonly');
        const store = tx.objectStore(PRODUCT_STORE);
        return new Promise((resolve, reject) => {
            const request = store.getAll();
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }

    async function addProduct(product) {
        const db = await openDB();
        const tx = db.transaction(PRODUCT_STORE, 'readwrite');
        const store = tx.objectStore(PRODUCT_STORE);
        return new Promise((resolve, reject) => {
            const request = store.add(product);
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }

    async function updateProduct(product) {
        const db = await openDB();
        const tx = db.transaction(PRODUCT_STORE, 'readwrite');
        const store = tx.objectStore(PRODUCT_STORE);
        return new Promise((resolve, reject) => {
            const request = store.put(product);
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }

    async function deleteProduct(id) {
        const db = await openDB();
        const tx = db.transaction(PRODUCT_STORE, 'readwrite');
        const store = tx.objectStore(PRODUCT_STORE);
        return new Promise((resolve, reject) => {
            const request = store.delete(id);
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }

    // ==================== UI 状态 ====================
    let products = [];

    async function loadAndRenderProducts() {
        products = await getAllProducts();
        renderProducts();
    }

    function renderProducts() {
        const container = document.getElementById('productList');
        if (!products.length) {
            container.innerHTML = '<div class="empty-msg">暂无产品，请添加</div>';
            return;
        }
        container.innerHTML = products.map(prod => `
            <div class="product-card" data-id="${prod.id}">
                <img class="card-img" src="${prod.imageBase64 || 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Crect width=\'100\' height=\'100\' fill=\'%23e2e8f0\'/%3E%3Ctext x=\'50\' y=\'55\' font-size=\'40\' text-anchor=\'middle\' fill=\'gray\'%3E📷%3C/text%3E%3C/svg%3E'}">
                <div class="card-info">
                    <div class="card-name">${escapeHtml(prod.name)}</div>
                    <div class="card-description">${escapeHtml(prod.description || '')}</div>
                    <div class="card-model">${escapeHtml(prod.model || '无型号')}</div>
                    <div class="card-price">¥ ${Number(prod.price).toFixed(2)}</div>
                    <div class="card-remark">📝 ${escapeHtml(prod.remark || '')}</div>
                    <div class="card-actions">
                        <button class="edit-btn" data-id="${prod.id}">✏️ 编辑</button>
                        <button class="delete-btn" data-id="${prod.id}">🗑️ 删除</button>
                    </div>
                </div>
            </div>
        `).join('');

        document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const id = parseInt(btn.dataset.id);
                const product = products.find(p => p.id === id);
                if (product) openEditModal(product);
            });
        });

        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const id = parseInt(btn.dataset.id);
                if (confirm('确定删除该产品？')) {
                    await deleteProduct(id);
                    await loadAndRenderProducts();
                }
            });
        });
    }

    // ==================== 编辑模态框逻辑 ====================
    let currentEditProduct = null;
    let isEditDirty = false;

    function openEditModal(product) {
        currentEditProduct = product;
        document.getElementById('editProdName').value = product.name;
        document.getElementById('editProdModel').value = product.model || '';
        document.getElementById('editProdDescription').value = product.description || '';
        document.getElementById('editProdPrice').value = product.price;
        document.getElementById('editProdRemark').value = product.remark || '';
        const preview = document.getElementById('editPreviewImg');
        if (product.imageBase64) {
            preview.src = product.imageBase64;
            preview.style.display = 'block';
        } else {
            preview.style.display = 'none';
        }
        document.getElementById('editModal').style.display = 'flex';
        isEditDirty = false;
    }

    function closeEditModal() {
        if (isEditDirty) {
            const confirm = window.confirm('您有未保存的修改，确定放弃吗？');
            if (!confirm) return;
        }
        document.getElementById('editModal').style.display = 'none';
        currentEditProduct = null;
        document.getElementById('editProdImage').value = '';
        isEditDirty = false;
    }

    async function saveEditProduct() {
        if (!currentEditProduct) return;
        const newName = document.getElementById('editProdName').value.trim();
        const newModel = document.getElementById('editProdModel').value.trim();
        const newDescription = document.getElementById('editProdDescription').value.trim();
        const newPrice = parseFloat(document.getElementById('editProdPrice').value);
        const newRemark = document.getElementById('editProdRemark').value.trim();
        if (!newName) { alert('产品名称不能为空'); return; }
        if (isNaN(newPrice) || newPrice < 0) { alert('请输入有效单价'); return; }
        
        let newImageBase64 = currentEditProduct.imageBase64;
        const fileInput = document.getElementById('editProdImage');
        if (fileInput.files && fileInput.files[0]) {
            const reader = new FileReader();
            reader.onload = async (ev) => {
                newImageBase64 = ev.target.result;
                currentEditProduct.name = newName;
                currentEditProduct.model = newModel;
                currentEditProduct.description = newDescription;
                currentEditProduct.price = newPrice;
                currentEditProduct.remark = newRemark;
                currentEditProduct.imageBase64 = newImageBase64;
                await updateProduct(currentEditProduct);
                await loadAndRenderProducts();
                isEditDirty = false;
                closeEditModal();
            };
            reader.readAsDataURL(fileInput.files[0]);
        } else {
            currentEditProduct.name = newName;
            currentEditProduct.model = newModel;
            currentEditProduct.description = newDescription;
            currentEditProduct.price = newPrice;
            currentEditProduct.remark = newRemark;
            await updateProduct(currentEditProduct);
            await loadAndRenderProducts();
            isEditDirty = false;
            closeEditModal();
        }
    }

    // ==================== 其他功能 ====================
    async function handleAddProduct() {
        const name = document.getElementById('prodName').value.trim();
        const model = document.getElementById('prodModel').value.trim();
        const description = document.getElementById('prodDescription').value.trim();
        const price = parseFloat(document.getElementById('prodPrice').value);
        const remark = document.getElementById('prodRemark').value.trim();
        const preview = document.getElementById('previewImg');
        if (!name) { alert('请填写产品名称'); return; }
        if (isNaN(price) || price < 0) { alert('请输入有效单价'); return; }

        let imageBase64 = preview.src && preview.style.display !== 'none' ? preview.src : '';
        if (!imageBase64) {
            imageBase64 = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23e2e8f0'/%3E%3Ctext x='50' y='55' font-size='40' text-anchor='middle' fill='gray'%3E📷%3C/text%3E%3C/svg%3E";
        }

        const newProduct = {
            name: name,
            model: model,
            description: description,
            price: price,
            remark: remark,
            imageBase64: imageBase64
        };
        await addProduct(newProduct);
        await loadAndRenderProducts();
        document.getElementById('prodName').value = '';
        document.getElementById('prodModel').value = '';
        document.getElementById('prodDescription').value = '';
        document.getElementById('prodPrice').value = '';
        document.getElementById('prodRemark').value = '';
        document.getElementById('prodImage').value = '';
        document.getElementById('previewImg').style.display = 'none';
        document.getElementById('previewImg').src = '';
    }

    async function exportProducts() {
        try {
            const products = await getAllProducts();
            const dataStr = JSON.stringify(products, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const now = new Date();
            const timestamp = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}-${String(now.getMinutes()).padStart(2,'0')}-${String(now.getSeconds()).padStart(2,'0')}`;
            a.download = `products_${timestamp}.json`;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 100);
        } catch (err) {
            console.error('导出产品库失败:', err);
            alert('导出失败：' + err.message);
        }
    }

    async function importProducts() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'application/json';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (ev) => {
                try {
                    const importedProducts = JSON.parse(ev.target.result);
                    if (!Array.isArray(importedProducts)) throw new Error('无效的产品库数据，应为数组');
                    if (!confirm('导入将替换当前所有产品库数据，是否继续？')) return;
                    
                    const db = await openDB();
                    const tx = db.transaction(PRODUCT_STORE, 'readwrite');
                    const store = tx.objectStore(PRODUCT_STORE);
                    await new Promise((resolve, reject) => {
                        const request = store.clear();
                        request.onsuccess = () => resolve();
                        request.onerror = () => reject(request.error);
                    });
                    
                    for (const prod of importedProducts) {
                        const { id, ...productData } = prod;
                        if (!productData.description) productData.description = '';
                        await addProduct(productData);
                    }
                    await loadAndRenderProducts();
                    alert('产品库导入成功');
                } catch (err) {
                    console.error('导入产品库失败:', err);
                    alert('导入失败：' + err.message);
                }
            };
            reader.readAsText(file);
        };
        input.click();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ==================== 初始化 ====================
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('uploadBtn').addEventListener('click', () => {
            document.getElementById('prodImage').click();
        });
        document.getElementById('prodImage').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const preview = document.getElementById('previewImg');
                    preview.src = ev.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        const toggleBtn = document.getElementById('toggleViewBtn');
        const productGrid = document.getElementById('productList');
        toggleBtn.addEventListener('click', () => {
            productGrid.classList.toggle('compact-view');
            toggleBtn.textContent = productGrid.classList.contains('compact-view') ? '🔍 恢复原始大小' : '🔍 切换缩略图模式';
        });

        document.getElementById('exportProductsBtn').addEventListener('click', exportProducts);
        document.getElementById('importProductsBtn').addEventListener('click', importProducts);
        document.getElementById('addProductBtn').addEventListener('click', handleAddProduct);
        document.getElementById('backToQuoteBtn').addEventListener('click', () => {
            window.location.href = 'quotation.html';
        });

        document.getElementById('editUploadBtn').addEventListener('click', () => {
            document.getElementById('editProdImage').click();
        });
        document.getElementById('editProdImage').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const preview = document.getElementById('editPreviewImg');
                    preview.src = ev.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });
        document.getElementById('cancelEditBtn').addEventListener('click', closeEditModal);
        document.getElementById('confirmEditBtn').addEventListener('click', saveEditProduct);

        const editProdName = document.getElementById('editProdName');
        const editProdModel = document.getElementById('editProdModel');
        const editProdDescription = document.getElementById('editProdDescription');
        const editProdPrice = document.getElementById('editProdPrice');
        const editProdRemark = document.getElementById('editProdRemark');
        const editProdImage = document.getElementById('editProdImage');
        editProdName.addEventListener('input', () => isEditDirty = true);
        editProdModel.addEventListener('input', () => isEditDirty = true);
        editProdDescription.addEventListener('input', () => isEditDirty = true);
        editProdPrice.addEventListener('input', () => isEditDirty = true);
        editProdRemark.addEventListener('input', () => isEditDirty = true);
        editProdImage.addEventListener('change', () => isEditDirty = true);

        const editModal = document.getElementById('editModal');
        editModal.addEventListener('click', (e) => {
            if (e.target === editModal) closeEditModal();
        });

        openDB().then(async () => {
            await loadAndRenderProducts();
        }).catch(err => {
            console.error(err);
            alert(`数据库初始化失败: ${err.message}`);
        });
    });

    let modalOpen = false;
    const editModal = document.getElementById('editModal');
    const observer = new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
            if (mutation.attributeName === 'style') {
                modalOpen = editModal.style.display === 'flex';
            }
        });
    });
    observer.observe(editModal, { attributes: true });

    window.addEventListener('keydown', (e) => {
        if (!modalOpen) return;
        if (e.key === 'Backspace') {
            const target = e.target;
            const isInput = target.tagName === 'INPUT' || target.tagName === 'TEXTAREA' || target.isContentEditable;
            if (!isInput) {
                e.preventDefault();
                return;
            }
        }
        if ((e.ctrlKey && e.key === 'r') || e.key === 'F5') {
            e.preventDefault();
            alert('编辑中，请勿刷新页面，以免丢失数据。');
            return;
        }
        if (e.altKey && e.key === 'ArrowLeft') {
            e.preventDefault();
            alert('编辑中，请勿使用后退按钮。');
            return;
        }
    });
</script>
</body>
</html>
